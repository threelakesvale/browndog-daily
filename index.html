<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Browndog Daily — Recording Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#1B2B4B;--orange:#E8620A;--cream:#FFF8F0;
    --green:#2E7D32;--lgreen:#E8F5E9;--purple:#4A1A6B;
    --lpurple:#F3E5F5;
  }
  body{background:var(--navy);font-family:'Source Sans 3',sans-serif;min-height:100vh;color:var(--navy)}

  .top-bar{background:var(--orange);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .top-bar h1{font-family:'Libre Baskerville',serif;font-size:17px;color:white}
  .top-bar .dog{font-size:20px}

  .tabs{display:flex;background:var(--navy);border-bottom:2px solid var(--orange)}
  .tab-btn{flex:1;padding:11px 6px;background:none;border:none;color:rgba(255,255,255,0.5);font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
  .tab-btn.active{color:white;border-bottom:3px solid var(--orange);margin-bottom:-2px}

  .date-nav{background:var(--navy);padding:10px 16px;display:flex;align-items:center;gap:8px}
  .date-nav select{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:600;padding:9px 12px;border-radius:8px;appearance:none;-webkit-appearance:none}
  .nav-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;font-size:18px;width:40px;height:40px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .nav-btn:active{background:rgba(255,255,255,0.25)}

  .card{background:var(--cream)}
  .section{padding:14px 18px;border-bottom:1px solid rgba(27,43,75,0.1)}
  .lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
  .lbl-g{color:var(--green)}.lbl-n{color:var(--navy)}.lbl-p{color:var(--purple)}.lbl-r{color:#B71C1C}

  .prompt-box{font-size:14px;line-height:1.55;color:var(--navy);background:var(--lgreen);padding:12px 14px;border-radius:9px;border-left:4px solid var(--green)}
  .moment-input{width:100%;min-height:88px;background:white;border:2px solid var(--purple);border-radius:9px;padding:12px 14px;font-family:'Source Sans 3',sans-serif;font-size:16px;line-height:1.5;color:var(--navy);resize:vertical;-webkit-appearance:none}
  .moment-input::placeholder{color:#aaa;font-style:italic}
  .moment-input:focus{outline:none;border-color:var(--orange)}

  .voice-bar{display:flex;align-items:center;gap:10px;margin-top:10px}
  .mic-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all 0.2s;background:var(--navy);color:white;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
  .mic-btn.listening{background:var(--orange);animation:pulse 1.2s infinite}
  .mic-btn:active{transform:scale(0.93)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,98,10,0.5)}50%{box-shadow:0 0 0 10px rgba(232,98,10,0)}}
  .voice-status{flex:1;font-size:13px;color:#999;font-style:italic}
  .voice-status.active{color:var(--orange);font-weight:600;font-style:normal}
  .redo-btn{background:none;border:1px solid #ddd;border-radius:7px;padding:7px 12px;font-size:12px;color:#999;cursor:pointer;font-family:'Source Sans 3',sans-serif;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .redo-btn.show{opacity:1;pointer-events:all}

  .script-box{background:white;border-radius:9px;padding:16px;font-size:16px;line-height:1.8;color:var(--navy);white-space:pre-wrap}
  .wlc{color:var(--green);font-style:italic}
  .mph{color:#ccc;font-style:italic}
  .mok{color:var(--purple);font-weight:600}
  .clsr{color:var(--orange);font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700}

  .closer-pill{background:var(--orange);color:white;font-family:'Libre Baskerville',serif;font-size:19px;font-weight:700;padding:14px 18px;border-radius:9px;text-align:center}

  .spotify-sec{background:var(--cream);padding:14px 18px 18px}
  .sp-row{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .sp-field{background:white;border:1px solid #ddd;border-radius:8px;padding:12px 14px}
  .sp-field .sp-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;margin-bottom:4px}
  .sp-field .sp-val{font-size:14px;line-height:1.5;color:var(--navy)}
  .cp-btn{margin-top:8px;width:100%;background:var(--navy);color:white;border:none;border-radius:7px;padding:10px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
  .cp-btn:active{background:#0d1c33}
  .cp-btn.copied{background:var(--green)}

  .actions{padding:14px 18px 32px;display:flex;flex-direction:column;gap:9px;background:var(--cream)}
  .btn-all{background:var(--navy);color:white;border:none;border-radius:9px;padding:15px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
  .btn-all:active{background:#0d1c33}
  .btn-all.copied{background:var(--green)}
  .btn-clr{background:transparent;color:#999;border:1px solid #ddd;border-radius:9px;padding:11px;font-family:'Source Sans 3',sans-serif;font-size:13px;cursor:pointer}

  .sdot{width:7px;height:7px;border-radius:50%;background:#ddd;display:inline-block;margin-right:5px;transition:background 0.3s}
  .sdot.ready{background:var(--green)}
  .deed-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .dtag{background:var(--navy);color:white;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Browndog Daily</h1>
  <span class="dog">🐕</span>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-daily" onclick="switchTab('daily')">📅 Daily Joy</button>
  <button class="tab-btn" id="tab-deeds" onclick="switchTab('deeds')">🤝 Good Deeds</button>
</div>

<!-- DAILY -->
<div id="panel-daily">
  <div class="date-nav">
    <button class="nav-btn" onclick="chg(-1,'daily')">‹</button>
    <select id="dsel" onchange="loadD(this.value)"></select>
    <button class="nav-btn" onclick="chg(1,'daily')">›</button>
  </div>
  <div class="card">
    <div class="section"><div class="lbl lbl-g">🎙 Browndog Moment Prompt</div><div class="prompt-box" id="d-prompt"></div></div>
    <div class="section">
      <div class="lbl lbl-p">✍️ Your Browndog Moment — type or speak</div>
      <textarea class="moment-input" id="d-moment" placeholder="Riff on the prompt. One or two real sentences. Something that happened, a habit you keep meaning to start, something from Lakeway, something about building Browndog..." oninput="updD();showRedoIfText()" rows="4"></textarea>
      <div class="voice-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Tap to speak your moment">🎙</button>
        <span class="voice-status" id="voice-status">Tap the mic to speak your moment</span>
        <button class="redo-btn" id="redo-btn" onclick="redoMic()">↺ Redo</button>
      </div>
    </div>
    <div class="section"><div class="lbl lbl-n"><span class="sdot" id="d-dot"></span>📻 Recording Script</div><div class="script-box" id="d-script"></div></div>
    <div class="section"><div class="lbl" style="color:var(--orange)">👋 Sign Off</div><div class="closer-pill" id="d-closer"></div></div>
  </div>
  <div class="spotify-sec">
    <div class="lbl lbl-r">🎵 Paste into Spotify Creator</div>
    <div class="sp-row">
      <div class="sp-field"><div class="sp-lbl">Episode Title</div><div class="sp-val" id="d-title"></div><button class="cp-btn" id="d-tbtn" onclick="cpf('d-title','d-tbtn','Title')">📋 Copy Title</button></div>
      <div class="sp-field"><div class="sp-lbl">Episode Description</div><div class="sp-val" id="d-desc"></div><button class="cp-btn" id="d-dbtn" onclick="cpf('d-desc','d-dbtn','Description')">📋 Copy Description</button></div>
    </div>
  </div>
  <div class="actions">
    <button class="btn-all" id="d-all" onclick="cpAll('daily')">📋 Copy Full Script</button>
    <button class="btn-clr" onclick="clrM()">Clear my moment</button>
  </div>
</div>

<!-- GOOD DEEDS -->
<div id="panel-deeds" style="display:none">
  <div class="date-nav">
    <button class="nav-btn" onclick="chg(-1,'deeds')">‹</button>
    <select id="gsel" onchange="loadG(this.value)"></select>
    <button class="nav-btn" onclick="chg(1,'deeds')">›</button>
  </div>
  <div class="card">
    <div class="section"><div class="lbl lbl-n">🤝 The Good Deed</div><div class="script-box" id="g-script" style="font-size:15px"></div><div class="deed-meta" id="g-meta"></div></div>
    <div class="section"><div class="lbl" style="color:var(--orange)">👋 Sign Off</div><div class="closer-pill" id="g-closer"></div></div>
  </div>
  <div class="spotify-sec">
    <div class="lbl lbl-r">🎵 Paste into Spotify Creator</div>
    <div class="sp-row">
      <div class="sp-field"><div class="sp-lbl">Episode Title</div><div class="sp-val" id="g-title"></div><button class="cp-btn" id="g-tbtn" onclick="cpf('g-title','g-tbtn','Title')">📋 Copy Title</button></div>
      <div class="sp-field"><div class="sp-lbl">Episode Description</div><div class="sp-val" id="g-desc"></div><button class="cp-btn" id="g-dbtn" onclick="cpf('g-desc','g-dbtn','Description')">📋 Copy Description</button></div>
    </div>
  </div>
  <div class="actions">
    <button class="btn-all" id="g-all" onclick="cpAll('deeds')">📋 Copy Full Script</button>
  </div>
</div>

<script>
const D=[
{date:"March 1",day:"Sunday",prompt:"🌱 Building Browndog: What's one thing about launching this that went nothing like you expected?",closer:"Love. Love. See ya tomorrow.",title:"Browndog Daily | A Bridge to Spring",desc:"A new month needs a new breath of air. Literally. Step outside, call someone, set three intentions. browndog.com",top:"March is the bridge to Spring. Let's cross it.\n\nHey, I'm Vale. This is Browndog Daily.\n\nStep outside for two minutes and feel the air. Just two minutes.\n\nCall a friend today and tell them you're thinking of them. Not a text — a call.\n\nSet your top three intentions for the month."},
{date:"March 2",day:"Monday",prompt:"☕ Morning routine: What does your actual morning look like vs. what you planned it would look like?",closer:"Love. Love. Talk tomorrow.",title:"Browndog Daily | That First Sip",desc:"Monday doesn't have to hit hard. Savor the first sip. Leave a note. Write three things down. browndog.com",top:"A new month, a new Monday.\n\nHey, I'm Vale. This is Browndog Daily.\n\nBrew your favorite drink and actually drink it. No phone. No news. Just that first sip.\n\nWrite a short note to a neighbor and leave it at their door.\n\nMake a list of three things you want to get done this week."},
{date:"March 3",day:"Tuesday",prompt:"🎵 Habits: What's a habit you keep meaning to start — and what keeps getting in the way?",closer:"Love. Love. Go play that song.",title:"Browndog Daily | Play the Whole Song",desc:"Play the whole song. Walk into a local business and mean it. Answer the thing you've been avoiding. browndog.com",top:"Tuesday energy. Let's use it.\n\nHey, I'm Vale. This is Browndog Daily.\n\nPut on a song you love and listen to it all the way through. No skipping.\n\nWalk into a local business today and tell them you appreciate them.\n\nAnswer one message you've been putting off."},
{date:"March 4",day:"Wednesday",prompt:"🌿 Lakeway: What's something you've noticed blooming or changing in your neighborhood this week?",closer:"Love. Love. Catch you tomorrow.",title:"Browndog Daily | Something's Blooming",desc:"Something is blooming on your street right now. Go find it. Then call the family member you've been meaning to call. browndog.com",top:"Halfway to the weekend. Let's connect.\n\nHey, I'm Vale. This is Browndog Daily.\n\nTake a ten-minute walk and notice what's blooming.\n\nCall a family member you haven't talked to in a while.\n\nWater a plant that looks thirsty."},
{date:"March 5",day:"Thursday",prompt:"📚 Small acts: Tell me about a time a small thing — holding a door, a smile — landed bigger than you expected.",closer:"Love. Love. Go hold that door.",title:"Browndog Daily | Small Acts",desc:"A chapter. A real smile at a door. One pile sorted. Small acts today — big difference by Friday. browndog.com",top:"Thursday. Small acts, big difference.\n\nHey, I'm Vale. This is Browndog Daily.\n\nRead a chapter of a book just for fun.\n\nHold the door open for someone and give them a real smile.\n\nSort through one pile of mail or papers."},
{date:"March 6",day:"Friday",prompt:"😄 Conversation: What's a conversation you almost skipped this week — and what happened when you didn't?",closer:"Love. Love. Go make someone laugh.",title:"Browndog Daily | You Made It to Friday",desc:"You made it to Friday. Write down three real things you're grateful for. Then make someone laugh. browndog.com",top:"It's Friday. You made it.\n\nHey, I'm Vale. This is Browndog Daily.\n\nWrite down three things you're grateful for from this week.\n\nTell someone a joke or share something that made you laugh.\n\nPlan one good meal for the weekend."},
{date:"March 7",day:"Saturday",prompt:"🥾 Lakeway: What's a trail or park near you that you keep meaning to get back to?",closer:"Love. Love. See ya.",title:"Browndog Daily | Find That Trail",desc:"There's a trail nearby you keep meaning to get back to. Today's the day. browndog.com",top:"Saturday morning. Take it slow.\n\nHey, I'm Vale. This is Browndog Daily.\n\nVisit a park or trail you haven't been to in a while.\n\nTake a photo of something beautiful and show it to someone in person.\n\nDo one load of laundry start to finish."},
{date:"March 8",day:"Sunday",prompt:"☕ Morning routine: What does a quiet Sunday morning actually look like for you — vs. what you wish it looked like?",closer:"Love. Love. Talk tomorrow.",title:"Browndog Daily | A Quiet Sunday",desc:"A quiet Sunday with a warm drink and no agenda. Tell someone in your house one real thing you appreciate about them. browndog.com",top:"A quiet Sunday to recharge.\n\nHey, I'm Vale. This is Browndog Daily.\n\nSit somewhere comfortable with a warm drink and no agenda.\n\nTell someone in your house one thing you appreciate about them.\n\nLay out what you need for Monday morning."},
{date:"March 9",day:"Monday",prompt:"🌱 Habits: What's one small morning habit you've been meaning to add — and why does Monday feel like the right day?",closer:"Love. Love. Go stretch it out.",title:"Browndog Daily | Fresh Start",desc:"New week. Five minutes of stretching, three smiles, one made bed. Fresh start costs nothing. browndog.com",top:"New week. Fresh start.\n\nHey, I'm Vale. This is Browndog Daily.\n\nStretch for five minutes before you start your day.\n\nSmile at three people today.\n\nMake your bed with intention."},
{date:"March 10",day:"Tuesday",prompt:"🎨 Building Browndog: What's something about the creative side of this that surprised you?",closer:"Love. Love. Go draw something terrible.",title:"Browndog Daily | Doodle Something",desc:"Some creativity doesn't require talent. Just ten minutes and a pen. Today's Daily Joy. browndog.com",top:"Tuesday. A little creativity goes a long way.\n\nHey, I'm Vale. This is Browndog Daily.\n\nDoodle or sketch for ten minutes. No skill required.\n\nPay someone a specific compliment today. Something real.\n\nClean off your kitchen counter."},
{date:"March 11",day:"Wednesday",prompt:"📱 Habits: How long does it actually take you to put your phone down when you mean to?",closer:"Love. Love. Go look up.",title:"Browndog Daily | Look Up",desc:"Go outside and look up for two minutes. Then call someone and actually listen. browndog.com",top:"Mid-week check-in. How are you doing?\n\nHey, I'm Vale. This is Browndog Daily.\n\nGo outside and look up at the sky for two minutes.\n\nCall someone and ask how they're really doing. Then actually listen.\n\nDrink a full glass of water right now."},
{date:"March 12",day:"Thursday",prompt:"📷 Morning routine: Do you have a box of old photos somewhere? What's in it you haven't looked at in years?",closer:"Love. Love. Catch you tomorrow.",title:"Browndog Daily | The Photo That Stops You",desc:"There's a photo somewhere that will stop you cold. Go find it. Then knock on a neighbor's door. browndog.com",top:"Thursday's plan: simple, tangible good.\n\nHey, I'm Vale. This is Browndog Daily.\n\nFlip through an old photo album or a box of photos.\n\nDrop off something small to a neighbor.\n\nTake out the recycling."},
{date:"March 13",day:"Friday",prompt:"🎵 Habits: What song do you still know every word to — and would never admit to in a meeting?",closer:"Love. Love. Go crank it.",title:"Browndog Daily | Lucky Friday",desc:"Friday the 13th. Lucky playlist, a real thank-you by name, and clean glasses. You're welcome. browndog.com",top:"Friday the 13th. We're making it lucky.\n\nHey, I'm Vale. This is Browndog Daily.\n\nPull up an upbeat playlist from when you were younger and let it run.\n\nThank a service worker by name today.\n\nClean your phone screen and glasses."},
{date:"March 14",day:"Saturday",prompt:"🏡 Lakeway: Who's a neighbor you keep meaning to actually talk to — not just wave at?",closer:"Love. Love. Go grab a chair.",title:"Browndog Daily | Porch Time",desc:"Porch. Fifteen minutes. Invite a neighbor. That's the whole plan. browndog.com",top:"Spring is in the air. Porch time.\n\nHey, I'm Vale. This is Browndog Daily.\n\nSit on your porch or stoop for fifteen minutes.\n\nInvite a neighbor to sit with you.\n\nSweep your front porch or entryway."},
{date:"March 15",day:"Sunday",prompt:"🙌 Building Browndog: What's something you've made for this company that you're actually proud of?",closer:"Love. Love. Go make something.",title:"Browndog Daily | Make Something",desc:"Make something with your hands today. A recipe, a letter, anything. Then share it. browndog.com",top:"A slow Sunday. The best kind.\n\nHey, I'm Vale. This is Browndog Daily.\n\nMake something with your hands today.\n\nShare what you made with someone.\n\nSet out your clothes for tomorrow."},
{date:"March 16",day:"Monday",prompt:"✍️ Habits: What's your real Monday morning ritual — vs. what you'd tell someone it is?",closer:"Love. Love. Go find that pen.",title:"Browndog Daily | One Intention",desc:"One intention — not a goal. A handwritten note to someone. One drawer. Monday done right. browndog.com",top:"Monday. Purpose, not just caffeine.\n\nHey, I'm Vale. This is Browndog Daily.\n\nWrite down one intention for the week.\n\nSend a handwritten note to someone. Actual pen. Actual paper.\n\nOrganize one drawer."},
{date:"March 17",day:"Tuesday — St. Patrick's Day",prompt:"🍀 Conversation: What's the luckiest conversation you've had while building Browndog?",closer:"Love. Love. Go find something green.",title:"Browndog Daily | Luck Is Optional",desc:"Wear green. Call an old friend. Try a new recipe. Luck is optional. Joy is not. browndog.com",top:"St. Patrick's Day. Luck is optional. Joy is not.\n\nHey, I'm Vale. This is Browndog Daily.\n\nWear something green today. Even if nobody sees it.\n\nCall an old friend and catch up for ten minutes.\n\nTry a new recipe for dinner tonight."},
{date:"March 18",day:"Wednesday",prompt:"🚶 Lakeway: What's a route you take on autopilot — and what do you think you've been missing?",closer:"Love. Love. Take the long way.",title:"Browndog Daily | Take the Long Way",desc:"Take a different route today. Leave a kind note in a library book. Wipe down the mirror. browndog.com",top:"Back to it after the holiday.\n\nHey, I'm Vale. This is Browndog Daily.\n\nTake a different route on your walk today.\n\nLeave a kind note in a library book.\n\nWipe down your bathroom mirror and sink."},
{date:"March 19",day:"Thursday",prompt:"🌬️ Building Browndog: What's something about building this that needed a reset to see clearly?",closer:"Love. Love. Go open that window.",title:"Browndog Daily | Open a Window",desc:"Open a window. Knock on a neighbor's door for no reason. Check the medicine cabinet. browndog.com",top:"Mid-week. Spring is knocking. Let it in.\n\nHey, I'm Vale. This is Browndog Daily.\n\nOpen a window and let fresh air in for ten minutes.\n\nKnock on a neighbor's door just to say hello.\n\nGo through your medicine cabinet and toss anything expired."},
{date:"March 20",day:"Friday — First Day of Spring",prompt:"☀️ Lakeway: Where do you actually go to stand in the sun in Lakeway? What's your spot?",closer:"Love. Love. Go stand in it.",title:"Browndog Daily | First Day of Spring",desc:"First day of Spring. Stand in the sun. Give someone a flower. Plant something. browndog.com",top:"First day of Spring. Official. It's here.\n\nHey, I'm Vale. This is Browndog Daily.\n\nStand in the sun for five minutes and feel the warmth.\n\nGive someone a flower today.\n\nPlant something."},
{date:"March 21",day:"Saturday",prompt:"☕ Morning routine: Coffee outside — have you actually done this recently? What happened?",closer:"Love. Love. Go take that outside.",title:"Browndog Daily | Coffee Outside",desc:"Take the coffee outside. Tell someone what you love about this time of year. Make a plan. browndog.com",top:"Spring is official and it's Saturday.\n\nHey, I'm Vale. This is Browndog Daily.\n\nTake your coffee or tea outside this morning.\n\nTell someone what you love about this time of year.\n\nPlan something fun for this weekend and write it down."},
{date:"March 22",day:"Sunday",prompt:"🛒 Lakeway: What's a local shop or vendor near you that more people should know about?",closer:"Love. Love. Go explore.",title:"Browndog Daily | Go Find One",desc:"There's a farmers market or local shop near you worth discovering. Go find one. browndog.com",top:"Saturday in Spring. Farmers market time.\n\nHey, I'm Vale. This is Browndog Daily.\n\nVisit a farmers market or local shop you haven't tried.\n\nStrike up a conversation with a vendor.\n\nWash your car or clean your front door."},
{date:"March 23",day:"Monday",prompt:"🏡 Habits: What's a Sunday reset habit you keep meaning to build — and what gets in the way?",closer:"Love. Love. Go open those windows.",title:"Browndog Daily | Open All the Windows",desc:"Open all the windows. Call someone who feels like home. Fill one bag for donation. browndog.com",top:"Sunday reset. Spring cleaning edition.\n\nHey, I'm Vale. This is Browndog Daily.\n\nOpen all the windows for thirty minutes.\n\nCall your parents or someone who feels like a parent to you.\n\nFill one bag with things to donate."},
{date:"March 24",day:"Tuesday",prompt:"🌱 Building Browndog: What's something about this specific week you're genuinely grateful for?",closer:"Love. Love. Go feel that grass.",title:"Browndog Daily | Bare Feet in Grass",desc:"Walk barefoot in the grass. Write a specific thank-you. Clean out the car. Spring energy. browndog.com",top:"New week. Spring energy.\n\nHey, I'm Vale. This is Browndog Daily.\n\nWalk barefoot in the grass for two minutes.\n\nWrite a thank-you note to someone who helped you recently.\n\nClean out your car."},

let di=9,gi=0,dM={};

function switchTab(t){
  document.getElementById('panel-daily').style.display=t==='daily'?'block':'none';
  document.getElementById('panel-deeds').style.display=t==='deeds'?'block':'none';
  document.getElementById('tab-daily').classList.toggle('active',t==='daily');
  document.getElementById('tab-deeds').classList.toggle('active',t==='deeds');
}

function init(){
  const ds=document.getElementById('dsel');
  D.forEach((e,i)=>{const o=document.createElement('option');o.value=i;o.textContent=e.date+' — '+e.day;ds.appendChild(o);});
  ds.value=di;
  const gs=document.getElementById('gsel');
  G.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent='#'+d.n+' — '+d.title.replace('Browndog Daily | Good Deed — ','');gs.appendChild(o);});
  gs.value=gi;
  loadD(di); loadG(gi);
}

function loadD(i){
  di=parseInt(i);
  document.getElementById('dsel').value=i;
  const e=D[di];
  document.getElementById('d-prompt').textContent=e.prompt;
  document.getElementById('d-closer').textContent=e.closer;
  document.getElementById('d-title').textContent=e.title;
  document.getElementById('d-desc').textContent=e.desc;
  document.getElementById('d-moment').value=dM[di]||'';
  updD();
  showRedoIfText();
}

function loadG(i){
  gi=parseInt(i);
  document.getElementById('gsel').value=i;
  const d=G[gi];
  document.getElementById('g-closer').textContent=d.closer;
  document.getElementById('g-title').textContent=d.title;
  document.getElementById('g-desc').textContent=d.desc;
  let html='';
  const lines=d.script.split('\\n');
  lines.forEach((l,idx)=>{
    const escaped=x(l);
    if(!escaped){html+='<br>';return;}
    if(l.startsWith("Hey, I'm Vale"))html+=`<span class="wlc">${escaped}</span><br>`;
    else html+=escaped+'<br>';
  });
  document.getElementById('g-script').innerHTML=html;
  document.getElementById('g-meta').innerHTML=`<span class="dtag">⏱ ${d.time}</span><span class="dtag">📍 ${d.loc}</span>`;
}

function updD(){
  const e=D[di],m=document.getElementById('d-moment').value.trim();
  dM[di]=m;
  let html='';
  e.top.split('\n').forEach(l=>{
    if(l.startsWith("Hey, I'm Vale"))html+=`<span class="wlc">${x(l)}</span>\n`;
    else html+=x(l)+'\n';
  });
  html+='\n';
  if(m){html+=`<span class="mok">${x(m)}</span>`;document.getElementById('d-dot').className='sdot ready';}
  else{html+=`<span class="mph">[ ✏️ type your moment above ]</span>`;document.getElementById('d-dot').className='sdot';}
  html+=`\n\n<span class="clsr">${x(e.closer)}</span>`;
  document.getElementById('d-script').innerHTML=html;
}

function chg(dir,w){
  if(w==='daily'){const n=di+dir;if(n>=0&&n<D.length)loadD(n);}
  else{const n=gi+dir;if(n>=0&&n<G.length)loadG(n);}
}

function cpf(vid,bid,lbl){
  navigator.clipboard.writeText(document.getElementById(vid).textContent).then(()=>{
    const b=document.getElementById(bid);
    b.textContent='✓ Copied!';b.classList.add('copied');
    setTimeout(()=>{b.innerHTML='📋 Copy '+lbl;b.classList.remove('copied');},2000);
  });
}

function cpAll(w){
  let txt='';
  if(w==='daily'){const e=D[di];const m=document.getElementById('d-moment').value.trim()||'[YOUR BROWNDOG MOMENT]';txt=e.top+'\n\n'+m+'\n\n'+e.closer;}
  else{const d=G[gi];txt=d.script+'\n\n'+d.closer;}
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById(w+'-all');
    b.textContent='✓ Copied!';b.classList.add('copied');
    setTimeout(()=>{b.innerHTML='📋 Copy Full Script';b.classList.remove('copied');},2000);
  });
}

function clrM(){document.getElementById('d-moment').value='';dM[di]='';updD();redoMic();}

// ── VOICE INPUT ───────────────────────────────────────────────
let recog=null, listening=false;

function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('voice-status').textContent='Voice input not supported in this browser. Use Chrome on Android or Safari on iPhone.';
    document.getElementById('mic-btn').style.opacity='0.3';
    document.getElementById('mic-btn').style.pointerEvents='none';
    return;
  }
  recog=new SR();
  recog.continuous=true;
  recog.interimResults=true;
  recog.lang='en-US';

  recog.onstart=()=>{
    listening=true;
    const btn=document.getElementById('mic-btn');
    const st=document.getElementById('voice-status');
    btn.classList.add('listening');
    btn.textContent='⏹';
    st.className='voice-status active';
    st.textContent='Listening... tap to stop';
    document.getElementById('redo-btn').classList.remove('show');
  };

  recog.onresult=(e)=>{
    let interim='', final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    const ta=document.getElementById('d-moment');
    const base=ta.dataset.base||'';
    ta.value=(base+final+interim).trim();
    if(final) ta.dataset.base=base+final;
    updD();
  };

  recog.onerror=(e)=>{
    if(e.error==='no-speech') return;
    stopMic();
    document.getElementById('voice-status').textContent='Mic error: '+e.error+'. Try again.';
  };

  recog.onend=()=>{ if(listening) stopMic(); };
}

function toggleMic(){
  if(!recog) initSpeech();
  if(!recog) return;
  if(listening) stopMic(); else startMic();
}

function startMic(){
  const ta=document.getElementById('d-moment');
  ta.dataset.base=ta.value?(ta.value.trim()+' '):'';
  try{ recog.start(); } catch(e){}
}

function stopMic(){
  listening=false;
  try{ recog.stop(); } catch(e){}
  const btn=document.getElementById('mic-btn');
  const st=document.getElementById('voice-status');
  btn.classList.remove('listening');
  btn.textContent='🎙';
  showRedoIfText();
  const val=document.getElementById('d-moment').value.trim();
  st.className='voice-status';
  st.textContent=val?'Got it. Edit above if needed.':'Tap the mic to speak your moment';
}

function showRedoIfText(){
  const val=document.getElementById('d-moment').value.trim();
  const rb=document.getElementById('redo-btn');
  if(val){rb.classList.add('show');}
  else{rb.classList.remove('show');}
}

function redoMic(){
  const ta=document.getElementById('d-moment');
  ta.value='';ta.dataset.base='';
  dM[di]='';updD();
  document.getElementById('redo-btn').classList.remove('show');
  document.getElementById('voice-status').textContent='Tap the mic to speak your moment';
}

initSpeech();
function x(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

init();
</script>
